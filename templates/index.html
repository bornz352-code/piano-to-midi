<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano → MIDI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f1a;
      --surface: #1a1b2e;
      --panel:   #22243a;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.12);
      --text:    #e2e4f0;
      --sub:     #6b6d8a;
      --accent:  #7c9ef8;
      --accent2: #a5b8fb;
      --green:   #6fcf97;
      --red:     #eb6f7a;
      --peach:   #f0a07a;
      --purple:  #b39ddb;
      --r:       12px;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(124,158,248,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 85% 80%, rgba(111,207,151,0.05) 0%, transparent 70%);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      width: 100%; max-width: 660px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px;
    }
    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #7c9ef8, #6fcf97);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; box-shadow: 0 4px 16px rgba(124,158,248,0.35);
    }
    .logo-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text p { font-size: 12px; color: var(--sub); margin-top: 1px; }
    .signout {
      font-size: 12px; color: var(--sub); text-decoration: none;
      padding: 6px 12px; border: 1px solid var(--border);
      border-radius: 6px; transition: color 0.15s, border-color 0.15s;
    }
    .signout:hover { color: var(--text); border-color: var(--border2); }

    /* ── Card ───────────────────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 24px;
      width: 100%; max-width: 660px;
      margin-bottom: 14px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }
    .card-title {
      font-size: 13px; font-weight: 600; color: var(--sub);
      text-transform: uppercase; letter-spacing: 0.7px;
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: ''; display: block; width: 3px; height: 14px;
      background: var(--accent); border-radius: 2px;
    }

    /* ── Tabs ───────────────────────────────────────────── */
    .tabs {
      display: flex; background: var(--surface); border-radius: 8px;
      padding: 3px; gap: 2px; margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 8px; font-size: 13px; font-weight: 500;
      color: var(--sub); border: none; background: none; cursor: pointer;
      border-radius: 6px; transition: all 0.15s;
    }
    .tab.active {
      background: var(--panel); color: var(--text);
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Drop zone ──────────────────────────────────────── */
    .drop-zone {
      border: 1.5px dashed rgba(124,158,248,0.25);
      border-radius: 10px; padding: 32px 20px;
      text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(124,158,248,0.03);
      margin-bottom: 20px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(124,158,248,0.07);
    }
    .drop-zone input[type=file] { display: none; }
    .dz-icon {
      width: 48px; height: 48px; border-radius: 12px; margin: 0 auto 12px;
      background: linear-gradient(135deg, rgba(124,158,248,0.2), rgba(111,207,151,0.1));
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .dz-text { font-size: 14px; font-weight: 500; color: var(--text); }
    .dz-hint { font-size: 12px; color: var(--sub); margin-top: 4px; }
    .dz-file {
      margin-top: 10px; font-size: 13px; font-weight: 500;
      color: var(--green); display: none;
      padding: 6px 10px; background: rgba(111,207,151,0.1);
      border-radius: 6px; display: none; align-items: center; gap: 6px;
      justify-content: center;
    }
    .dz-file.visible { display: flex; }

    /* ── Fields ─────────────────────────────────────────── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600; color: var(--sub);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px;
    }

    /* BPM row */
    .bpm-row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
    .bpm-field { display: flex; align-items: center; gap: 0; }
    .bpm-field button {
      width: 32px; height: 36px; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 16px; cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .bpm-field button:first-child { border-radius: 7px 0 0 7px; border-right: none; }
    .bpm-field button:last-child  { border-radius: 0 7px 7px 0; border-left: none; }
    .bpm-field button:hover { background: var(--panel); }
    .bpm-field input[type=number] {
      width: 60px; height: 36px; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 14px; font-weight: 600; text-align: center;
      -moz-appearance: textfield; border-radius: 0;
    }
    .bpm-field input[type=number]::-webkit-inner-spin-button,
    .bpm-field input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .bpm-status { font-size: 11px; color: var(--sub); margin-bottom: 4px; }

    /* ── Buttons ────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 20px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s, opacity 0.15s;
      text-decoration: none; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #7c9ef8, #6a8de8);
      color: #fff;
      box-shadow: 0 2px 12px rgba(124,158,248,0.35);
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(124,158,248,0.5); }
    .btn-record {
      background: linear-gradient(135deg, #eb6f7a, #d9606a);
      color: #fff;
      box-shadow: 0 2px 12px rgba(235,111,122,0.35);
    }
    .btn-record.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: none;
      border: 1px solid var(--border);
    }
    .btn-download {
      background: linear-gradient(135deg, #6fcf97, #5ab87f);
      color: #fff;
      box-shadow: 0 2px 12px rgba(111,207,151,0.3);
      display: none;
    }
    .btn-download.visible { display: inline-flex; }

    /* ── Progress ───────────────────────────────────────── */
    .progress-wrap { margin-top: 20px; }
    .progress-track {
      background: var(--surface); border-radius: 99px;
      height: 4px; overflow: hidden; margin-bottom: 9px;
      border: 1px solid var(--border);
    }
    .progress-fill {
      height: 100%; border-radius: 99px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width 0.35s ease;
      position: relative; overflow: hidden;
    }
    .progress-fill::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .progress-msg { font-size: 12px; color: var(--sub); min-height: 16px; }

    /* ── Piano roll ─────────────────────────────────────── */
    .roll-wrap { margin-top: 24px; }
    .roll-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .roll-header span { font-size: 11px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.6px; }
    .roll-stats { font-size: 11px; color: var(--sub); }
    .roll-container {
      display: flex; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .roll-scroll { overflow-x: auto; flex: 1; }
    .roll-scroll::-webkit-scrollbar { height: 4px; }
    .roll-scroll::-webkit-scrollbar-track { background: var(--surface); }
    .roll-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    canvas { display: block; }

    /* ── History ────────────────────────────────────────── */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--border2); }
    .history-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(124,158,248,0.2), rgba(179,157,219,0.15));
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .history-dl {
      padding: 5px 10px; font-size: 12px;
      background: rgba(111,207,151,0.12); color: var(--green);
      border: 1px solid rgba(111,207,151,0.2); border-radius: 6px;
      text-decoration: none; font-weight: 600; white-space: nowrap;
      transition: background 0.15s;
    }
    .history-dl:hover { background: rgba(111,207,151,0.22); }

    /* ── Recording ──────────────────────────────────────── */
    .rec-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #fff; display: inline-block;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    .timer {
      font-size: 40px; font-weight: 700; text-align: center;
      letter-spacing: 4px; color: var(--red); margin: 20px 0;
      font-variant-numeric: tabular-nums;
    }
    .rec-idle { text-align: center; padding: 24px 0; }
    .rec-idle p { font-size: 13px; color: var(--sub); margin-top: 8px; }

    /* ── Divider ────────────────────────────────────────── */
    .divider { width: 100%; max-width: 660px; height: 1px; background: var(--border); margin: 6px 0 14px; }

    /* ── Action row ─────────────────────────────────────── */
    .action-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">🎹</div>
      <div class="logo-text">
        <h1>Piano → MIDI</h1>
        <p>Polyphonic audio transcription</p>
      </div>
    </div>
    <a href="/logout" class="signout">Sign out</a>
  </header>

  <!-- ── Main convert card ─────────────────────────────── -->
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('file', this)">Convert File</button>
      <button class="tab" onclick="switchTab('url', this)">URL</button>
      <button class="tab" onclick="switchTab('rec', this)">Record</button>
    </div>

    <!-- File tab -->
    <div class="tab-panel active" id="tab-file">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".wav,.mp3,.flac,.ogg,.aiff,.m4a,.mp4,.mov,.mkv,audio/*,video/*" />
        <div class="dz-icon">🎵</div>
        <div class="dz-text">Drop your file here</div>
        <div class="dz-hint">WAV · MP3 · FLAC · MP4 · MOV and more</div>
        <div class="dz-file" id="dz-file">
          <span>✓</span><span id="filename"></span>
        </div>
      </div>

      <div class="bpm-row">
        <div class="field" style="margin:0">
          <label>Tempo (BPM)</label>
          <div class="bpm-status" id="bpm-status"></div>
          <div class="bpm-field">
            <button onclick="stepBpm(-1)">−</button>
            <input type="number" id="tempo" value="120" min="20" max="300" />
            <button onclick="stepBpm(1)">+</button>
          </div>
        </div>
        <div class="action-row" style="margin-top:22px">
          <button class="btn btn-primary" id="convert-btn" onclick="startConvert()" disabled>Convert to MIDI</button>
          <a class="btn btn-download" id="download-btn" download="output.mid">⬇ Download</a>
        </div>
      </div>

      <div class="progress-wrap" id="convert-progress" style="display:none">
        <div class="progress-track"><div class="progress-fill" id="convert-bar"></div></div>
        <div class="progress-msg" id="convert-msg"></div>
      </div>

    </div>

    <!-- URL tab -->
    <div class="tab-panel" id="tab-url">
      <div class="field">
        <label>Instagram / YouTube / SoundCloud URL</label>
        <div style="display:flex;gap:8px">
          <input type="url" id="url-input" placeholder="https://www.instagram.com/p/…"
            style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;outline:none;font-family:inherit" />
          <button class="btn btn-primary" id="url-fetch-btn" onclick="fetchUrl()">Load</button>
        </div>
      </div>

      <div id="url-player" style="display:none">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px">
          <div id="url-title" style="font-size:13px;font-weight:600;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
          <audio id="audio-player" controls style="width:100%;height:36px"></audio>
        </div>

        <div class="bpm-row">
          <div class="field" style="margin:0">
            <label>Tempo (BPM)</label>
            <div class="bpm-field">
              <button onclick="stepBpm3(-1)">−</button>
              <input type="number" id="url-tempo" value="120" min="20" max="300" />
              <button onclick="stepBpm3(1)">+</button>
            </div>
          </div>
          <div class="action-row" style="margin-top:22px">
            <button class="btn btn-primary" id="url-convert-btn" onclick="convertUrl()">Convert to MIDI</button>
            <a class="btn btn-download" id="url-download-btn" download="output.mid">⬇ Download</a>
          </div>
        </div>

        <div class="progress-wrap" id="url-progress" style="display:none">
          <div class="progress-track"><div class="progress-fill" id="url-bar"></div></div>
          <div class="progress-msg" id="url-msg"></div>
        </div>
      </div>

      <div id="url-fetch-progress" style="display:none;margin-top:12px">
        <div class="progress-track"><div class="progress-fill" id="url-fetch-bar" style="width:100%;animation:shimmer 1.5s infinite"></div></div>
        <div class="progress-msg" id="url-fetch-msg">Fetching audio…</div>
      </div>
    </div>

    <!-- Record tab -->
    <div class="tab-panel" id="tab-rec">
      <div class="rec-idle" id="rec-idle">
        <button class="btn btn-record" id="rec-btn" onclick="toggleRecord()">⏺ Start Recording</button>
        <p>Click to record from your microphone</p>
      </div>

      <div id="rec-active" style="display:none; text-align:center">
        <div class="timer" id="timer">0:00</div>
        <button class="btn btn-record active" id="rec-stop-btn" onclick="toggleRecord()">
          <span class="rec-dot"></span> Stop Recording
        </button>
      </div>

      <div class="field" style="margin-top:20px">
        <label>Tempo (BPM)</label>
        <div class="bpm-field">
          <button onclick="stepBpm2(-1)">−</button>
          <input type="number" id="rec-tempo" value="120" min="20" max="300" />
          <button onclick="stepBpm2(1)">+</button>
        </div>
      </div>

      <div class="progress-wrap" id="rec-progress" style="display:none">
        <div class="progress-track"><div class="progress-fill" id="rec-bar"></div></div>
        <div class="progress-msg" id="rec-msg"></div>
      </div>

      <div style="margin-top:12px">
        <a class="btn btn-download" id="rec-download-btn" download="output.mid">⬇ Download</a>
      </div>
    </div>
  </div>

  <!-- ── History ───────────────────────────────────────── -->
  <div class="card" id="history-card" style="display:none">
    <div class="card-title">Recent Conversions</div>
    <div class="history-list" id="history-body"></div>
  </div>

<script>
// ── Tab switching ────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── BPM steppers ─────────────────────────────────────────────────────────────
function stepBpm(d)  { const el = document.getElementById('tempo');     el.value = Math.min(300, Math.max(20, +el.value + d)); }
function stepBpm2(d) { const el = document.getElementById('rec-tempo'); el.value = Math.min(300, Math.max(20, +el.value + d)); }
function stepBpm3(d) { const el = document.getElementById('url-tempo'); el.value = Math.min(300, Math.max(20, +el.value + d)); }

// ── URL fetch & play ─────────────────────────────────────────────────────────
let currentAudioId = null;

async function fetchUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  document.getElementById('url-fetch-btn').disabled = true;
  document.getElementById('url-player').style.display = 'none';
  document.getElementById('url-fetch-progress').style.display = 'block';
  document.getElementById('url-fetch-msg').textContent = 'Fetching audio… (may take a few seconds)';

  try {
    const resp = await fetch('/fetch-url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      document.getElementById('url-fetch-msg').textContent = '❌ ' + (data.error || 'Failed to fetch');
      return;
    }
    currentAudioId = data.id;
    document.getElementById('url-title').textContent = data.title || 'Audio';
    document.getElementById('audio-player').src = '/stream/' + data.id;
    document.getElementById('url-player').style.display = 'block';
    document.getElementById('url-fetch-progress').style.display = 'none';
    document.getElementById('url-download-btn').style.display = 'none';
  } catch (e) {
    document.getElementById('url-fetch-msg').textContent = '❌ ' + e.message;
  } finally {
    document.getElementById('url-fetch-btn').disabled = false;
  }
}

async function convertUrl() {
  if (!currentAudioId) return;
  const jobId = 'url_' + Date.now();
  const tempo = document.getElementById('url-tempo').value;

  document.getElementById('url-convert-btn').disabled = true;
  document.getElementById('url-download-btn').style.display = 'none';
  document.getElementById('url-progress').style.display = 'block';
  setProgress('url', 5, 'Starting…');

  const form = new FormData();
  form.append('audio_id', currentAudioId);
  form.append('tempo', tempo);
  form.append('job_id', jobId);

  const pollId = setInterval(async () => {
    try {
      const r = await fetch('/progress/' + jobId);
      const d = await r.json();
      setProgress('url', d.pct, d.msg);
      if (d.done) clearInterval(pollId);
    } catch {}
  }, 400);

  try {
    const resp = await fetch('/convert-url', { method: 'POST', body: form });
    clearInterval(pollId);
    if (!resp.ok) {
      const d = await resp.json();
      setProgress('url', 0, '❌ ' + (d.error || 'Failed'));
      return;
    }
    const blob = await resp.blob();
    const dl = document.getElementById('url-download-btn');
    dl.href = URL.createObjectURL(blob);
    dl.style.display = 'inline-flex';
    setProgress('url', 100, '✓ Done! Click Download to save.');
    loadHistory();
  } catch (e) {
    clearInterval(pollId);
    setProgress('url', 0, '❌ ' + e.message);
  } finally {
    document.getElementById('url-convert-btn').disabled = false;
  }
}

// Allow pressing Enter in the URL field
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchUrl();
  });
});

// ── History ─────────────────────────────────────────────────────────────────
async function loadHistory() {
  const resp = await fetch('/history');
  const entries = await resp.json();
  const card = document.getElementById('history-card');
  const body = document.getElementById('history-body');
  if (!entries.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  body.innerHTML = entries.map(e => `
    <div class="history-item">
      <div class="history-icon">🎼</div>
      <div class="history-info">
        <div class="history-name">${e.filename}</div>
        <div class="history-meta">${e.note_count} notes · ${e.created_at}</div>
      </div>
      <a href="/download/${e.id}" class="history-dl">⬇ MIDI</a>
    </div>`).join('');
}
loadHistory();

// ── State ───────────────────────────────────────────────────────────────────
let selectedFile = null;
let mediaRecorder = null;
let recordedChunks = [];
let timerInterval = null;
let recSeconds = 0;

// ── File drop & select ──────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

function setFile(f) {
  selectedFile = f;
  document.getElementById('filename').textContent = f.name;
  document.getElementById('dz-file').classList.add('visible');
  document.getElementById('convert-btn').disabled = false;
  document.getElementById('download-btn').style.display = 'none';
  document.getElementById('convert-progress').style.display = 'none';
  document.getElementById('roll-wrap').style.display = 'none';
  autoDetectBpm(f);
}

async function autoDetectBpm(f) {
  const status = document.getElementById('bpm-status');
  status.textContent = '⏳ Detecting tempo…';
  const form = new FormData();
  form.append('audio', f);
  try {
    const resp = await fetch('/detect-bpm', { method: 'POST', body: form });
    const data = await resp.json();
    if (data.bpm) {
      document.getElementById('tempo').value = data.bpm;
      status.textContent = `✓ Detected ${data.bpm} BPM`;
    } else {
      status.textContent = '';
    }
  } catch {
    status.textContent = '';
  }
}

// ── Convert file ────────────────────────────────────────────────────────────
async function startConvert() {
  if (!selectedFile) return;
  const jobId = 'file_' + Date.now();
  const tempo = document.getElementById('tempo').value;

  document.getElementById('convert-btn').disabled = true;
  document.getElementById('download-btn').style.display = 'none';
  document.getElementById('convert-progress').style.display = 'block';
  setProgress('convert', 5, 'Uploading…');

  const form = new FormData();
  form.append('audio', selectedFile);
  form.append('tempo', tempo);
  form.append('job_id', jobId);

  const pollId = setInterval(async () => {
    try {
      const r = await fetch('/progress/' + jobId);
      const d = await r.json();
      setProgress('convert', d.pct, d.msg);
      if (d.done) clearInterval(pollId);
    } catch {}
  }, 400);

  try {
    const resp = await fetch('/convert', { method: 'POST', body: form });
    clearInterval(pollId);
    if (!resp.ok) {
      const d = await resp.json();
      setProgress('convert', 0, '❌ ' + (d.error || 'Conversion failed'));
      document.getElementById('convert-btn').disabled = false;
      return;
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const dl = document.getElementById('download-btn');
    dl.href = url;
    dl.style.display = 'inline-flex';
    setProgress('convert', 100, '✓ Done! Click Download to save.');
    loadHistory();
  } catch (e) {
    clearInterval(pollId);
    setProgress('convert', 0, '❌ ' + e.message);
  } finally {
    document.getElementById('convert-btn').disabled = false;
  }
}

function setProgress(prefix, pct, msg) {
  document.getElementById(prefix + '-bar').style.width = pct + '%';
  document.getElementById(prefix + '-msg').textContent = msg;
}

// ── Record ──────────────────────────────────────────────────────────────────
async function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    alert('Microphone access denied: ' + e.message);
    return;
  }

  recordedChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    clearInterval(timerInterval);
    document.getElementById('rec-idle').style.display = 'block';
    document.getElementById('rec-active').style.display = 'none';
    await processRecording();
  };

  mediaRecorder.start(100);
  document.getElementById('rec-idle').style.display = 'none';
  document.getElementById('rec-active').style.display = 'block';
  recSeconds = 0;
  updateTimer();
  timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
  recSeconds++;
  const m = Math.floor(recSeconds / 60);
  const s = recSeconds % 60;
  document.getElementById('timer').textContent = m + ':' + String(s).padStart(2, '0');
}

async function processRecording() {
  const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
  const ext = (mediaRecorder.mimeType || '').includes('ogg') ? '.ogg' : '.webm';
  const file = new File([blob], 'recording' + ext, { type: blob.type });

  const jobId = 'rec_' + Date.now();
  const tempo = document.getElementById('rec-tempo').value;

  document.getElementById('rec-progress').style.display = 'block';
  document.getElementById('rec-download-btn').style.display = 'none';
  setProgress('rec', 5, 'Uploading recording…');

  const form = new FormData();
  form.append('audio', file);
  form.append('tempo', tempo);
  form.append('job_id', jobId);

  const pollId = setInterval(async () => {
    try {
      const r = await fetch('/progress/' + jobId);
      const d = await r.json();
      setProgress('rec', d.pct, d.msg);
      if (d.done) clearInterval(pollId);
    } catch {}
  }, 400);

  try {
    const resp = await fetch('/convert', { method: 'POST', body: form });
    clearInterval(pollId);
    if (!resp.ok) {
      const d = await resp.json();
      setProgress('rec', 0, '❌ ' + (d.error || 'Conversion failed'));
      return;
    }
    const dlBlob = await resp.blob();
    const url = URL.createObjectURL(dlBlob);
    const dl = document.getElementById('rec-download-btn');
    dl.href = url;
    dl.style.display = 'inline-flex';
    setProgress('rec', 100, '✓ Done! Click Download to save.');
    loadHistory();
  } catch (e) {
    clearInterval(pollId);
    setProgress('rec', 0, '❌ ' + e.message);
  }
}
</script>
