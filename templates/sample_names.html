<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beat Name Generator · STUDIO AID</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f1a;
      --surface: #1a1b2e;
      --panel:   #1e2035;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.15);
      --text:    #e2e4f0;
      --sub:     #6b6d8a;
      --accent:  #7c9ef8;
      --green:   #6fcf97;
      --purple:  #b39ddb;
      --peach:   #f0a07a;
      --teal:    #00d4ff;
      --brand:   #a259ff;
      --cyan:    #00d4ff;
      --grad:    linear-gradient(135deg, #a259ff, #00d4ff);
      --r:       14px;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 50% at 10% 10%, rgba(162,89,255,0.1) 0%, transparent 65%),
        radial-gradient(ellipse 60% 60% at 90% 85%, rgba(0,212,255,0.07) 0%, transparent 65%);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header {
      width: 100%; max-width: 760px;
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 28px; margin-bottom: 0;
    }
    .header-bar {
      width: 100%; max-width: 760px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(162,89,255,0.4), rgba(0,212,255,0.3), transparent);
      margin: 16px 0 44px;
    }
    .back {
      font-size: 12px; color: var(--sub); text-decoration: none;
      padding: 7px 14px; border: 1px solid var(--border);
      border-radius: 8px; transition: color 0.15s, border-color 0.15s; font-weight: 500;
    }
    .back:hover { color: var(--text); border-color: var(--border2); }
    .page-title { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .page-icon {
      width: 44px; height: 44px; border-radius: 13px;
      background: linear-gradient(135deg, #a259ff, #00d4ff);
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      box-shadow: 0 4px 20px rgba(162,89,255,0.4);
    }
    .page-title .brand-name {
      font-size: 20px; font-weight: 900; letter-spacing: -0.4px;
      background: linear-gradient(135deg, #a259ff, #00d4ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .page-title .brand-by { font-size: 10px; font-weight: 600; color: var(--sub); letter-spacing: 1.3px; text-transform: uppercase; margin-top: 2px; }

    .main { width: 100%; max-width: 760px; display: flex; flex-direction: column; gap: 20px; }

    .form-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r); padding: 32px 28px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.3);
    }
    .form-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
    .field label { font-size: 11px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; }
    .field select, .field input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: inherit;
      font-size: 13px; padding: 11px 13px; outline: none;
      transition: border-color 0.15s;
    }
    .field select:focus, .field input:focus { border-color: var(--teal); }
    .field input::placeholder { color: var(--sub); }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .generate-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #a259ff, #00d4ff);
      border: none; border-radius: 10px;
      color: #fff; font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      margin-top: 20px; letter-spacing: 0.3px;
      box-shadow: 0 3px 16px rgba(162,89,255,0.4);
    }
    .generate-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 5px 24px rgba(162,89,255,0.6); }
    .generate-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .results-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r); padding: 28px;
      display: none; box-shadow: 0 4px 28px rgba(0,0,0,0.3);
    }
    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .results-header h2 { font-size: 15px; font-weight: 700; }
    .copy-all-btn {
      font-size: 12px; font-weight: 600;
      padding: 7px 16px; border-radius: 8px;
      background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.25);
      color: var(--teal); cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .copy-all-btn:hover { background: rgba(0,212,255,0.2); }

    .names-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }
    .name-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 13px;
      font-size: 13px; font-weight: 500;
      color: var(--text); gap: 8px;
      transition: border-color 0.15s;
    }
    .name-item:hover { border-color: var(--border2); }
    .name-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .copy-btn {
      font-size: 11px; color: var(--sub); background: none; border: none;
      cursor: pointer; padding: 2px 4px; border-radius: 4px;
      flex-shrink: 0; transition: color 0.15s;
      font-family: inherit;
    }
    .copy-btn:hover { color: var(--teal); }
    .copy-btn.copied { color: var(--green); }

    .error-msg {
      background: rgba(240,122,122,0.1); border: 1px solid rgba(240,122,122,0.25);
      color: #f07a7a; border-radius: 9px; padding: 12px 16px;
      font-size: 13px; display: none; margin-top: 12px;
    }
    .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <a href="/" class="back">← Home</a>
    <a href="/" class="page-title">
      <div class="page-icon">🎛️</div>
      <div>
        <div class="brand-name">STUDIO AID</div>
        <div class="brand-by">by BORNZ</div>
      </div>
    </a>
    <div style="width:80px"></div>
  </header>
  <div class="header-bar"></div>

  <div class="main">

    <div class="form-card">
      <div class="form-row">
        <div class="field">
          <label>Genre</label>
          <select id="genre">
            <option>Trap</option>
            <option>Boom Bap</option>
            <option>Lo-Fi</option>
            <option>House</option>
            <option>Techno</option>
            <option>Drum & Bass</option>
            <option>Jungle</option>
            <option>Afrobeat</option>
            <option>R&B / Soul</option>
            <option>Ambient</option>
            <option>Pop</option>
            <option>Rock</option>
            <option>Jazz</option>
            <option>Cinematic</option>
            <option>Drill</option>
            <option>UK Garage</option>
          </select>
        </div>
        <div class="field">
          <label>Mood / Vibe</label>
          <select id="mood">
            <option>Dark</option>
            <option>Bright</option>
            <option>Chill</option>
            <option>Aggressive</option>
            <option>Dreamy</option>
            <option>Melancholic</option>
            <option>Euphoric</option>
            <option>Mysterious</option>
            <option>Romantic</option>
            <option>Motivational</option>
            <option>Raw / Gritty</option>
            <option>Warm</option>
          </select>
        </div>
        <div class="field" style="max-width:100px">
          <label>Key (opt.)</label>
          <input id="key" type="text" placeholder="e.g. Am" maxlength="5" />
        </div>
        <div class="field" style="max-width:90px">
          <label>BPM (opt.)</label>
          <input id="bpm" type="number" placeholder="140" min="40" max="300" />
        </div>
        <div class="field" style="max-width:90px">
          <label>Count</label>
          <select id="count">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="30">30</option>
            <option value="50">50</option>
          </select>
        </div>
      </div>

      <button class="generate-btn" id="gen-btn" onclick="generate()">
        <span id="btn-label">Generate Beat Names</span>
        <div class="spinner" id="btn-spinner"></div>
      </button>

      <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="results-card" id="results-card">
      <div class="results-header">
        <h2 id="results-title">Generated Names</h2>
        <button class="copy-all-btn" onclick="copyAll()">Copy All</button>
      </div>
      <div class="names-grid" id="names-grid"></div>
    </div>

  </div>

  <script>
    async function generate() {
      const btn = document.getElementById('gen-btn');
      const label = document.getElementById('btn-label');
      const spinner = document.getElementById('btn-spinner');
      const errorMsg = document.getElementById('error-msg');

      btn.disabled = true;
      label.style.display = 'none';
      spinner.style.display = 'block';
      errorMsg.style.display = 'none';

      const fd = new FormData();
      fd.append('genre', document.getElementById('genre').value);
      fd.append('mood', document.getElementById('mood').value);
      fd.append('key', document.getElementById('key').value);
      fd.append('bpm', document.getElementById('bpm').value);
      fd.append('count', document.getElementById('count').value);

      try {
        const res = await fetch('/generate-sample-names', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        renderNames(data.names);
      } catch (e) {
        errorMsg.textContent = '❌ ' + e.message;
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        label.style.display = 'block';
        spinner.style.display = 'none';
      }
    }

    function renderNames(names) {
      const card = document.getElementById('results-card');
      const grid = document.getElementById('names-grid');
      const title = document.getElementById('results-title');

      title.textContent = `${names.length} Beat Names`;
      grid.innerHTML = '';
      names.forEach((name, i) => {
        const item = document.createElement('div');
        item.className = 'name-item';
        item.innerHTML = `
          <span class="name-text" title="${name}">${name}</span>
          <button class="copy-btn" id="copy-${i}" onclick="copyName('${name.replace(/'/g, "\\'")}', ${i})">Copy</button>
        `;
        grid.appendChild(item);
      });
      card.style.display = 'block';
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copyName(name, idx) {
      navigator.clipboard.writeText(name).then(() => {
        const btn = document.getElementById(`copy-${idx}`);
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
      });
    }

    function copyAll() {
      const names = [...document.querySelectorAll('.name-text')].map(el => el.textContent).join('\n');
      navigator.clipboard.writeText(names).then(() => {
        const btn = document.querySelector('.copy-all-btn');
        const orig = btn.textContent;
        btn.textContent = '✓ Copied!';
        setTimeout(() => btn.textContent = orig, 1800);
      });
    }
  </script>
</body>
</html>
