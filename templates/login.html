<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano → MIDI · Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e1e2e; --panel: #313244; --border: #45475a;
      --text: #cdd6f4; --sub: #6c7086; --accent: #89b4fa; --red: #f38ba8;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: "Inter", system-ui, sans-serif; font-size: 14px;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 360px;
      text-align: center;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--sub); font-size: 13px; margin-bottom: 28px; }
    label { display: block; text-align: left; font-size: 12px; color: var(--sub);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    input[type=password] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); padding: 10px 12px;
      font-size: 14px; margin-bottom: 18px; outline: none;
    }
    input[type=password]:focus { border-color: var(--accent); }
    button {
      width: 100%; background: var(--accent); color: #11111b; border: none;
      border-radius: 7px; padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .error { color: var(--red); font-size: 13px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Piano → MIDI</h1>
    <p class="sub">Enter your password to continue</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" />
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
